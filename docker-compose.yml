services:
  whatsapp-bridge:
    build: ./whatsapp-bridge
    container_name: wa-bridge
    ports:
      - "8080:8080"
    volumes:
      - wa-data:/data
    environment:
      # Apuntamos el bridge al ammos-bot para el MVP.
      # Para volver al bot legal, cambiar a http://bot:8000/webhook
      - BOT_WEBHOOK_URL=${BOT_WEBHOOK_URL:-http://ammos-bot:8000/webhook}
      - BOT_NAME=${BOT_NAME:-Ammos}
      - LISTEN_ADDR=:8080
    depends_on:
      ammos-bot:
        condition: service_started
    restart: unless-stopped

  ammos-bot:
    build: ./ammos-bot
    container_name: ammos-bot
    ports:
      - "8001:8000"
    volumes:
      - ammos-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - WA_BRIDGE_URL=http://whatsapp-bridge:8080
      - ADMIN_TOKEN=${ADMIN_TOKEN:-dev-token-change-me}
      - SEND_ENABLED=${SEND_ENABLED:-false}
      - TIMEZONE=${TIMEZONE:-America/Argentina/Cordoba}
      - DB_PATH=/app/data/ammos.db
      - SCHEDULER_INTERVAL_SEC=${SCHEDULER_INTERVAL_SEC:-30}
      - MAX_MSG_PER_SEC=${MAX_MSG_PER_SEC:-1}
    restart: unless-stopped

  # Bot legal original. Lo dejamos disponible pero no arranca por default.
  # Para correrlo: docker compose --profile legal up bot
  bot:
    build: ./bot
    container_name: wa-bot
    profiles: ["legal"]
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials
      - bot-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/credentials.json
      - GOOGLE_TOKEN_PATH=/app/credentials/token.json
      - WA_BRIDGE_URL=http://whatsapp-bridge:8080
      - BOT_NAME=${BOT_NAME:-Bot}
      - TIMEZONE=America/Argentina/Cordoba
      - CALENDAR_ID=${CALENDAR_ID:-primary}
      - DB_PATH=/app/data/estudio.db
    restart: unless-stopped

volumes:
  wa-data:
  ammos-data:
  bot-data:
