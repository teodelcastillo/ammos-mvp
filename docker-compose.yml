services:
  whatsapp-bridge:
    build: ./whatsapp-bridge
    container_name: wa-bridge
    ports:
      - "8080:8080"
    volumes:
      - wa-data:/data
    environment:
      - BOT_WEBHOOK_URL=http://bot:8000/webhook
      - BOT_NAME=${BOT_NAME:-Bot}
      - LISTEN_ADDR=:8080
    depends_on:
      bot:
        condition: service_started
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: wa-bot
    ports:
      - "8000:8000"
    volumes:
      - ./credentials:/app/credentials
      - bot-data:/app/data
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GOOGLE_CREDENTIALS_PATH=/app/credentials/credentials.json
      - GOOGLE_TOKEN_PATH=/app/credentials/token.json
      - WA_BRIDGE_URL=http://whatsapp-bridge:8080
      - BOT_NAME=${BOT_NAME:-Bot}
      - TIMEZONE=America/Argentina/Cordoba
      - CALENDAR_ID=${CALENDAR_ID:-primary}
      - DB_PATH=/app/data/estudio.db
    restart: unless-stopped

  facturas:
    build: ./gestion-facturas
    container_name: facturas-app
    ports:
      - "3000:3000"
    volumes:
      - facturas-data:/app/data
    environment:
      - FACTURAS_DB_PATH=/app/data/facturas.db
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - SESSION_SECRET=${SESSION_SECRET:-changeme-min-32-chars-secret-key!!}
      - TUSFACTURAS_API_TOKEN=${TUSFACTURAS_API_TOKEN}
      - TUSFACTURAS_API_KEY=${TUSFACTURAS_API_KEY}
      - TUSFACTURAS_USER_TOKEN=${TUSFACTURAS_USER_TOKEN}
      - TUSFACTURAS_PUNTO_VENTA=${TUSFACTURAS_PUNTO_VENTA}
      - TUSFACTURAS_ENV=${TUSFACTURAS_ENV:-sandbox}
      - NODE_ENV=production
    restart: unless-stopped

volumes:
  wa-data:
  bot-data:
  facturas-data:
